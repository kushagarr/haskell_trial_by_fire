#version: '3.9'

services:
  trial_by_fire:
    build: 
      context: ..
      dockerfile: .devcontainer/Dockerfile

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ..:/trial_by_fire
      - ~/.ssh:/root/.ssh
      - ~/.config/nvim:/root/.config/nvim
      - /Volumes/vms/shared_folder/progs:/progs

    environment:
      DOCKER_HOST: unix:///var/run/docker.sock

    # Bubblewrap needs to create and manage nested namespaces in this
    # development container. Keep this narrower than privileged: true.
    cap_add:
      - SYS_ADMIN
    security_opt:
      - seccomp=unconfined

    command: /bin/sh -c "while sleep 1000; do :; done"
